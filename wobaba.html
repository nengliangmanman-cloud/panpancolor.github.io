*{box-sizing:border-box;margin:0;padding:0;user-select:none;}
body{background:#0f0820;display:flex;justify-content:center;align-items:flex-start;min-height:100vh;padding:16px 0;overflow-x:hidden;-webkit-tap-highlight-color:transparent;touch-action:manipulation;}
#gw{width:100%;max-width:400px;margin:0 auto;background:#1a1a2e;border-radius:24px;overflow:hidden;border:2px solid #4a3060;font-family:system-ui,sans-serif;}
#topbar{background:#2d1b4e;padding:8px 14px;display:flex;justify-content:space-between;align-items:center;}
.tbtitle{font-size:15px;font-weight:700;color:#ffe066;letter-spacing:1px;}
.tbinfo{display:flex;gap:12px;}
.tbitem{text-align:center;}
.tblabel{font-size:9px;color:#a080c0;display:block;}
.tbval{font-size:15px;font-weight:700;color:#fff;}
#scene{position:relative;width:100%;height:420px;overflow:hidden;touch-action:none;}
#bgc,#gc,#darkc{touch-action:none;}
#bgc,#gc,#darkc{position:absolute;top:0;left:0;}
#darkc{pointer-events:none;z-index:5;}
#uilayer{position:absolute;inset:0;pointer-events:none;overflow:hidden;z-index:6;}
.overlay{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;background:rgba(12,6,30,0.94);z-index:20;touch-action:auto;pointer-events:auto;}
.big-e{font-size:54px;margin-bottom:4px;}
.stitle{font-size:19px;font-weight:700;color:#ffe066;margin-bottom:4px;letter-spacing:2px;}
.ssub{font-size:11px;color:#c0a0e0;margin-bottom:14px;text-align:center;line-height:1.8;padding:0 16px;}
.scene-btns{display:flex;flex-wrap:wrap;gap:8px;justify-content:center;margin-bottom:10px;}
.sbtn{padding:8px 14px;border-radius:12px;border:none;font-size:13px;font-weight:700;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:2px;-webkit-tap-highlight-color:transparent;touch-action:manipulation;}
.sbtn .sbe{font-size:20px;}
.sbtn .sbn{font-size:11px;}
.sbtn .sbd{font-size:10px;opacity:0.8;}
.sbtn-park{background:#3B6D11;color:#d8f0a0;}
.sbtn-office{background:#854F0B;color:#ffe8b0;}
.sbtn-home{background:#791F1F;color:#ffd0d0;}
.sbtn-wild{background:#1a5c2a;color:#c8f0a0;}
.mode-btns{display:flex;gap:10px;}
.mbtn{padding:10px 18px;border-radius:12px;border:none;font-size:13px;font-weight:700;cursor:pointer;-webkit-tap-highlight-color:transparent;touch-action:manipulation;}
.mbtn-p{background:#c87820;color:#fff8e0;}
.mbtn-t{background:#2060c0;color:#e0f0ff;}
.rbtn{background:#4a2080;color:#ffe066;padding:9px 26px;border-radius:12px;border:none;font-size:13px;font-weight:700;cursor:pointer;margin-top:4px;}
#ctrlbar{background:#2d1b4e;padding:8px 14px;display:flex;gap:10px;}
.cbtn{flex:1;padding:9px 0;border-radius:10px;border:none;font-size:20px;cursor:pointer;background:#4a2880;color:#fff;font-weight:700;-webkit-tap-highlight-color:transparent;touch-action:manipulation;}
.cbtn:active{transform:scale(0.95);}
#hint{background:#2d1b4e;padding:2px 14px 7px;font-size:10px;color:#8060a0;text-align:center;}
.pill{position:absolute;font-size:11px;font-weight:700;padding:2px 7px;border-radius:8px;background:#ffe066;color:#3a1800;pointer-events:none;animation:fup 0.8s ease forwards;z-index:10;}
@keyframes fup{0%{opacity:1;transform:translateY(0);}100%{opacity:0;transform:translateY(-34px);}}
.status-badge{position:absolute;top:8px;left:50%;transform:translateX(-50%);background:rgba(30,10,60,0.85);color:#ffe066;font-size:11px;font-weight:700;padding:4px 12px;border-radius:10px;z-index:10;pointer-events:none;animation:fup 1.5s ease forwards;}

// 圆角矩形兼容函数（iOS Safari roundRect polyfill）
function rrect(ctx,x,y,w,h,r){
  ctx.beginPath();
  ctx.moveTo(x+r,y);
  ctx.lineTo(x+w-r,y);
  ctx.quadraticCurveTo(x+w,y,x+w,y+r);
  ctx.lineTo(x+w,y+h-r);
  ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);
  ctx.lineTo(x+r,y+h);
  ctx.quadraticCurveTo(x,y+h,x,y+h-r);
  ctx.lineTo(x,y+r);
  ctx.quadraticCurveTo(x,y,x+r,y);
  ctx.closePath();
}

// ── 音效 ──────────────────────────────────────────
var AudioCtx=window.AudioContext||window.webkitAudioContext;
var actx=null;
function getACtx(){if(!actx)actx=new AudioCtx();if(actx.state==='suspended')actx.resume();return actx;}
function playTone(freqs,dur,type,vol){
  try{var ac=getACtx();var g=ac.createGain();g.gain.setValueAtTime(vol||0.25,ac.currentTime);g.gain.exponentialRampToValueAtTime(0.001,ac.currentTime+dur);g.connect(ac.destination);freqs.forEach(function(f,i){var o=ac.createOscillator();o.type=type||'sine';o.frequency.setValueAtTime(f,ac.currentTime+i*(dur/freqs.length));o.connect(g);o.start(ac.currentTime+i*(dur/freqs.length));o.stop(ac.currentTime+dur+0.05);});}catch(e){}
}
function sfxPlop(){try{var ac=getACtx();var o=ac.createOscillator();var g=ac.createGain();o.type='sine';o.frequency.setValueAtTime(280,ac.currentTime);o.frequency.exponentialRampToValueAtTime(60,ac.currentTime+0.18);g.gain.setValueAtTime(0.45,ac.currentTime);g.gain.exponentialRampToValueAtTime(0.001,ac.currentTime+0.22);o.connect(g);g.connect(ac.destination);o.start();o.stop(ac.currentTime+0.25);}catch(e){}}
function sfxFlush(){try{var ac=getACtx();var buf=ac.createBuffer(1,ac.sampleRate*0.8,ac.sampleRate);var data=buf.getChannelData(0);for(var i=0;i<data.length;i++)data[i]=(Math.random()*2-1);var src=ac.createBufferSource();src.buffer=buf;var f=ac.createBiquadFilter();f.type='bandpass';f.frequency.setValueAtTime(800,ac.currentTime);f.frequency.exponentialRampToValueAtTime(200,ac.currentTime+0.7);f.Q.value=0.8;var g=ac.createGain();g.gain.setValueAtTime(0.35,ac.currentTime);g.gain.exponentialRampToValueAtTime(0.001,ac.currentTime+0.8);src.connect(f);f.connect(g);g.connect(ac.destination);src.start();src.stop(ac.currentTime+0.85);}catch(e){}}
function sfxCollect(){playTone([523,784,1047],0.25,'triangle',0.22);}

function drawBgPark(){

  bx.setLineDash([12,8]);
  bx.beginPath();bx.moveTo(200,260);bx.lineTo(200,H);bx.stroke();
  bx.setLineDash([]);
  // 树1
  drawTree(bx,60,200,50);
  drawTree(bx,320,190,45);
  drawTree(bx,150,220,35);
  // 公共厕所小屋
  bx.fillStyle='#e8d8b0';bx.fillRect(280,140,100,120);
  bx.fillStyle='#c0784a';bx.fillRect(275,130,110,18);
  bx.fillStyle='#8ab8e0';bx.fillRect(295,158,28,30);bx.fillRect(338,158,28,30);
  bx.fillStyle='#c08050';bx.fillRect(312,188,16,32);
  bx.fillStyle='#a06838';bx.beginPath();bx.arc(320,196,3,0,Math.PI*2);bx.fill();
  bx.fillStyle='#4a3020';bx.font='bold 12px sans-serif';bx.textAlign='center';
  bx.fillText('厕所',330,175);bx.textAlign='left';
  // 长椅
  bx.fillStyle='#c09060';bx.fillRect(80,240,60,10);
  bx.fillStyle='#a07840';bx.fillRect(84,250,4,12);bx.fillRect(132,250,4,12);
  // 云
  drawCloud(bx,80,40);drawCloud(bx,240,25);drawCloud(bx,340,55);
  // 地面
  bx.fillStyle='#c8b870';bx.fillRect(0,H-40,W,40);
  bx.strokeStyle='#b0a060';bx.lineWidth=1;
  for(var px2=0;px2<W;px2+=30){bx.strokeRect(px2,H-40,30,40);}
}

function drawTree(ctx,x,y,r){
  ctx.fillStyle='#4a7020';ctx.beginPath();ctx.arc(x,y-r*0.3,r,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='#3a5818';ctx.beginPath();ctx.arc(x-r*0.3,y,r*0.8,0,Math.PI*2);ctx.fill();
  ctx.beginPath();ctx.arc(x+r*0.3,y,r*0.8,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='#6a4020';ctx.fillRect(x-6,y+r*0.5,12,r*0.8);
}
function drawCloud(ctx,x,y){
  ctx.fillStyle='rgba(255,255,255,0.85)';
  ctx.beginPath();ctx.arc(x,y,18,0,Math.PI*2);ctx.fill();
  ctx.beginPath();ctx.arc(x+20,y+4,14,0,Math.PI*2);ctx.fill();
  ctx.beginPath();ctx.arc(x-16,y+6,12,0,Math.PI*2);ctx.fill();
}

function drawBush(ctx,x,y,r){
  ctx.fillStyle='#2d6018';
  ctx.beginPath();ctx.arc(x,y,r,0,Math.PI*2);ctx.fill();
  ctx.beginPath();ctx.arc(x-r*0.5,y+r*0.2,r*0.7,0,Math.PI*2);ctx.fill();
  ctx.beginPath();ctx.arc(x+r*0.5,y+r*0.2,r*0.7,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='#3d7825';
  ctx.beginPath();ctx.arc(x,y-r*0.1,r*0.8,0,Math.PI*2);ctx.fill();
}

function drawDarkOverlay(){
  if(!SCENES[currentScene].darkMode) return;
  dx.clearRect(0,0,W,H);

  var cx2=px+pw/2, cy2=py+ph/2;

  if(darkVisible){
    // 🔦 手电筒激活：大范围照亮，边缘柔和渐变
    // 先铺一层半透明夜色底（不完全遮住，保留轮廓感）
    dx.fillStyle='rgba(2,4,18,0.55)';
    dx.fillRect(0,0,W,H);

    // 手电筒主光圈：完全透明 → 半透明 → 夜色
    var grd=dx.createRadialGradient(cx2,cy2,0,cx2,cy2,200);
    grd.addColorStop(0,'rgba(0,0,0,0)');       // 中心完全透明
    grd.addColorStop(0.45,'rgba(0,0,0,0)');    // 宽敞明亮区
    grd.addColorStop(0.75,'rgba(2,4,18,0.55)');// 柔和过渡
    grd.addColorStop(1,'rgba(2,4,18,0.92)');   // 边缘变暗
    dx.globalCompositeOperation='source-over';
    dx.fillStyle=grd;
    dx.fillRect(0,0,W,H);

    // 手电筒暖光晕（黄色调，增加临场感）
    var warmGrd=dx.createRadialGradient(cx2,cy2,0,cx2,cy2,130);
    warmGrd.addColorStop(0,'rgba(255,240,180,0.06)');
    warmGrd.addColorStop(0.5,'rgba(255,220,120,0.03)');
    warmGrd.addColorStop(1,'rgba(0,0,0,0)');
    dx.fillStyle=warmGrd;
    dx.fillRect(0,0,W,H);

    // 月光从窗户透进来（右上角固定光斑，给场景增加层次）
    var moonGrd=dx.createRadialGradient(340,50,0,340,50,90);
    moonGrd.addColorStop(0,'rgba(180,200,255,0.18)');
    moonGrd.addColorStop(0.6,'rgba(120,150,220,0.06)');
    moonGrd.addColorStop(1,'rgba(0,0,0,0)');
    dx.fillStyle=moonGrd;
    dx.fillRect(0,0,W,H);

  } else {
    // 🌑 无手电筒：只有微弱月光，能看到轮廓但很暗
    dx.fillStyle='rgba(2,4,18,0.82)';
    dx.fillRect(0,0,W,H);

    // 保留月光窗户透光
    var moonGrd2=dx.createRadialGradient(340,50,0,340,50,100);
    moonGrd2.addColorStop(0,'rgba(160,180,255,0.22)');
    moonGrd2.addColorStop(0.5,'rgba(100,130,200,0.08)');
    moonGrd2.addColorStop(1,'rgba(0,0,0,0)');
    dx.fillStyle=moonGrd2;
    dx.fillRect(0,0,W,H);

    // 玩家身边极微弱的环境光（让玩家能看到自己）
    var dimGrd=dx.createRadialGradient(cx2,cy2,0,cx2,cy2,70);
    dimGrd.addColorStop(0,'rgba(0,0,0,0)');
    dimGrd.addColorStop(0.4,'rgba(2,4,18,0.2)');
    dimGrd.addColorStop(1,'rgba(2,4,18,0.0)');
    dx.fillStyle=dimGrd;
    dx.fillRect(0,0,W,H);
  }
  dx.globalCompositeOperation='source-over';
}

// ── 道具加权随机 ──────────────────────────────────
function weightedPick(pool){
  var total=0;
  for(var i=0;i<pool.length;i++) total+=pool[i].wt;
  var r=Math.random()*total;
  for(var i=0;i<pool.length;i++){r-=pool[i].wt;if(r<=0)return pool[i];}
  return pool[pool.length-1];
}

// ── 道具生成 ──────────────────────────────────────
function spawn(){
  var sc=SCENES[currentScene];
  var pool=mode==='poop'?sc.poolP:(sc.poolD||sc.poolT);
  var src=weightedPick(pool);
  var t={type:src.type,e:src.e,w:src.w,h:src.h,pts:src.pts};
  t.x=16+Math.random()*(W-60);
  t.y=-44;
  t.vy=(src.spd+(score/400))*sc.spdMult;
  t.vx=0;
  fallers.push(t);
}

// ── 浮动提示 ──────────────────────────────────────
function pill(txt,x,y,col){
  var el=document.createElement('div');
  el.className='pill';
  el.style.left=x+'px';el.style.top=y+'px';
  if(col) el.style.color=col;
  el.textContent=txt;
  uilayer.appendChild(el);
  setTimeout(function(){el.remove();},850);
}
function badge(txt){
  var el=document.createElement('div');
  el.className='status-badge';
  el.textContent=txt;
  uilayer.appendChild(el);
  setTimeout(function(){el.remove();},1400);
}

// ── 特效计时器管理 ─────────────────────────────────
function addEffect(prop,val,reset,duration){
  setGameVar(prop,val);
  var tid=setTimeout(function(){setGameVar(prop,reset);},duration);
  effectTimers.push(tid);
}
function setGameVar(prop,val){
  if(prop==='spd') spd=val;
  else if(prop==='darkVisible') darkVisible=val;
  else if(prop==='invincible') invincible=val;
  else if(prop==='doubleScore') doubleScore=val;
  else if(prop==='running') running=val;
  else if(prop==='slowActive') slowActive=val;
}
function clearEffects(){
  effectTimers.forEach(function(t){clearTimeout(t);});
  effectTimers=[];
  darkVisible=true;invincible=false;slowActive=false;doubleScore=false;
  spd=baseSpd;
}

// ── 碰撞检测 ──────────────────────────────────────
function hit(f){
  return f.x<px+pw-6&&f.x+f.w>px+6&&f.y<py+ph-4&&f.y+f.h>py+4;
}

// ── 触发道具效果 ──────────────────────────────────
function handleItem(f,vx,vy){
  var add=0;
  switch(f.type){
    case 'boss':
      if(currentScene==='office'&&!invincible){sfxBoss();endGame(false,'被老板抓到了！💼 拉屎被终止！');return false;}
      else if(invincible){pill('无敌挡住！',vx,vy,'#f0c000');break;}
      break;
    case 'dog':
      if(!invincible){sfxBark();endGame(false,'被狗狗吃掉了！🐕 粑粑的末日！');return false;}
      else{pill('无敌挡住！',vx,vy,'#f0c000');break;}
    case 'toilet':
      if(!invincible){sfxFlush();endGame(false,'被马桶吸走了！💀');return false;}
      else{pill('无敌挡住！',vx,vy,'#f0c000');break;}
    case 'paper':
      if(mode==='poop'){add=f.pts;sfxCollect();pill('+'+add,vx,vy,'#1a6000');}
      else{add=f.pts;sfxBlock();pill(f.pts+'🧻',vx,vy,'#b02000');}
      break;
    case 'poop':
      add=doubleScore?f.pts*2:f.pts;sfxPlop();
      pill(doubleScore?'×2 +'+add:'+'+add,vx,vy,'#1a6000');
      break;
    case 'laxative':
      add=f.pts;sfxSpeed();spd=baseSpd*2;
      addEffect('spd',baseSpd*2,baseSpd,2800);
      pill('💊加速！+'+add,vx,vy,'#c04000');badge('💊 泻药加速3秒！');
      break;
    case 'leaf':
      add=f.pts;sfxCollect();pill('+'+add,vx,vy,'#1a6000');break;
    case 'coffee':
      add=f.pts;sfxCollect();pill('☕+'+add,vx,vy,'#703000');break;
    case 'bird':
      if(mode==='poop'){
        sfxBird();doubleScore=true;
        addEffect('doubleScore',true,false,3000);
        pill('🐦双倍得分！',vx,vy,'#1040c0');badge('🐦 双倍得分3秒！');
      } else {
        add=f.pts;sfxCollect();pill('+'+add,vx,vy,'#1a6000');
      }
      break;
    case 'phone':
      add=f.pts;sfxBlock();
      if(mode==='poop'){
        spd=baseSpd*0.4;addEffect('spd',baseSpd*0.4,baseSpd,2500);
        pill('📱老板来电！'+add,vx,vy,'#b02000');badge('📱 被老板打扰，减速！');
      } else {
        pill('📱'+add,vx,vy,'#b02000');
      }
      break;
    case 'mute':
      sfxCollect();
      // 取消下一次phone效果（简化：给短暂加速）
      spd=baseSpd*1.5;addEffect('spd',baseSpd*1.5,baseSpd,2000);
      pill('🔕免打扰！',vx,vy,'#1040a0');badge('🔕 免打扰模式！');
      break;
    case 'torch':
      sfxStar();darkVisible=true;
      addEffect('darkVisible',true,false,5000);
      pill('🔦看清了！',vx,vy,'#c0a000');badge('🔦 手电筒！5秒视野');
      break;
    case 'star':
      sfxStar();invincible=true;
      addEffect('invincible',true,false,3000);
      pill('⭐无敌！',vx,vy,'#c0a000');badge('⭐ 无敌3秒！');
      break;
    case 'cat':
      add=f.pts;sfxBlock();
      running=false;
      addEffect('running',false,true,1800);
      pill('🐱绊倒！'+add,vx,vy,'#802000');badge('🐱 猫咪绊倒，僵硬！');
      break;
    case 'flower':
      add=f.pts;sfxCollect();pill('+'+add+'🌸',vx,vy,'#c03080');break;
    case 'mushroom':
      add=f.pts;sfxCollect();pill('+'+add+'🍄',vx,vy,'#803000');break;
    case 'mosquito':
      if(!invincible){
        add=f.pts;sfxMosquito();
        spd=baseSpd*0.5;addEffect('spd',baseSpd*0.5,baseSpd,2000);
        pill('🦟叮！'+add,vx,vy,'#804000');badge('🦟 被蚊子叮，瘙痒减速！');
      } else { pill('无敌！',vx,vy,'#f0c000'); }
      break;
    case 'snake':
      if(!invincible){sfxFlush();endGame(false,'被蛇咬了！🐍 野外太危险！');return false;}
      else{pill('无敌挡住！',vx,vy,'#f0c000');break;}
    case 'plug':
      if(!invincible){add=f.pts;sfxBlock();pill(add+'🔌',vx,vy,'#802000');}
      else{pill('无敌！',vx,vy,'#f0c000');}
      break;
  }
  var pts=Math.max(0,add);
  score=Math.max(0,score+add);
  scEl.textContent=score;
  return true;
}

// ── 主更新 ────────────────────────────────────────
function update(dt){
  if(!running) return;
  var sc=SCENES[currentScene];

  // 移动
  var curSpd=slowActive?baseSpd*0.5:spd;
  if(keys.left) px=Math.max(0,px-curSpd);
  if(keys.right) px=Math.min(W-pw-4,px+curSpd);

  // 风效果（公园）
  if(sc.wind){
    windTimer+=dt;
    if(windTimer>3000){windTimer=0;windDir*=-1;}
    windOffset=Math.sin(windTimer/1200)*1.5*windDir;
    for(var i=0;i<fallers.length;i++) fallers[i].vx=windOffset;
  }

  // 波次（办公室）：每10秒额外刷3个道具
  if(sc.wave){
    waveTimer+=dt;
    if(waveTimer>10000){
      waveTimer=0;
      badge('📢 开会提醒！障碍来袭！');
      for(var w=0;w<3;w++){
        setTimeout(function(){if(running)spawn();},w*200);
      }
    }
  }

  // 暗视野更新（家里）
  if(sc.darkMode) drawDarkOverlay();

  // 野外特殊行为：蚊子Z字 + 狗狗左右追踪粑粑
  if(currentScene==='wild'){
    for(var mi=0;mi<fallers.length;mi++){
      var mf=fallers[mi];
      if(mf.type==='mosquito'){
        mf.vx=Math.sin(mf.y/18)*3;
      } else if(mf.type==='dog'&&mode==='poop'){
        // 狗狗追踪：朝粑粑X方向偏移，越低越准
        var trackStr=Math.min(0.06, mf.y/4000);
        var targetX=px+pw/2-mf.w/2;
        mf.x=mf.x+(targetX-mf.x)*trackStr;
        mf.x=Math.max(0,Math.min(W-mf.w,mf.x));
      }
    }
  }

  // 生成道具
  spawnT+=dt;
  if(spawnT>sc.spawnInterval){spawn();spawnT=0;}

  // 道具碰撞
  for(var i=fallers.length-1;i>=0;i--){
    var f=fallers[i];
    f.y+=f.vy;
    f.x+=f.vx||0;
    f.x=Math.max(-10,Math.min(W-f.w+10,f.x));
    if(f.y>H+30){fallers.splice(i,1);continue;}
    if(hit(f)){
      var vx2=Math.round(f.x),vy2=Math.round(f.y-20);
      fallers.splice(i,1);
      var cont=handleItem(f,vx2,vy2);
      if(!cont) return;
    }
  }
}

// ── 渲染循环 ──────────────────────────────────────
var last=0;
function loop(ts){
  var dt=ts-last;last=ts;
  cx.clearRect(0,0,W,H);
  cx.font='28px serif';
  for(var i=0;i<fallers.length;i++){
    var f=fallers[i];
    if(invincible&&Math.floor(ts/100)%2===0) cx.globalAlpha=0.5;
    cx.fillText(f.e,f.x,f.y+f.h);
    cx.globalAlpha=1;
  }
  cx.font='36px serif';
  if(invincible&&Math.floor(ts/80)%2===0) cx.globalAlpha=0.6;
  if(mode==='poop') cx.fillText('💩',px,py+ph);
  else if(currentScene==='wild') cx.fillText('🐕',px,py+ph);
  else cx.fillText('🚽',px,py+ph);
  cx.globalAlpha=1;
  update(dt);
  animId=requestAnimationFrame(loop);
}

// ── 游戏流程 ──────────────────────────────────────
function selectScene(s){
  currentScene=s;
  var sc=SCENES[s];
  scenescreen.style.display='none';
  modescreen.style.display='flex';
  document.getElementById('mode-scene-e').textContent=sc.emoji;
  document.getElementById('mode-scene-name').textContent=sc.name;
  var btnT=document.getElementById('btn-toilet');
  if(s==='wild'){
    btnT.textContent='🐕 我是狗狗';
    btnT.style.background='#7a4a10';
    btnT.style.color='#ffe8b0';
    document.getElementById('mode-scene-desc').textContent=sc.desc+'\n💩 粑粑：收集树叶野花，躲避蚊子\n🐕 狗狗：吃掉粑粑，越多越好！';
    document.getElementById('md').textContent='';
  } else {
    btnT.textContent='🚽 我是马桶';
    btnT.style.background='#2060c0';
    btnT.style.color='#e0f0ff';
    document.getElementById('mode-scene-desc').textContent=sc.desc+'\n💩 粑粑：收集道具，躲避马桶\n🚽 马桶：接住粑粑，越多越好';
  }
}

function fmtTime(s){var m=Math.floor(s/60);var ss=s%60;return m+':'+(ss<10?'0':'')+ss;}

function startGame(m){
  var sc=SCENES[currentScene];
  mode=m;score=0;tLeft=sc.time;fallers=[];spawnT=0;waveTimer=0;windTimer=0;
  px=180;py=360;baseSpd=5;spd=5;
  clearEffects();
  darkVisible=!sc.darkMode;
  modescreen.style.display='none';
  overscreen.style.display='none';
  sceneLabel.textContent=sc.name;
  var roleEmoji=m==='poop'?'💩':(currentScene==='wild'?'🐕':'🚽');
  mdEl.textContent=roleEmoji;
  scEl.textContent='0';tiEl.textContent=fmtTime(sc.time);
  hintEl.textContent=m==='poop'?'躲避危险，收集道具！':(currentScene==='wild'?'🐕吃掉💩越多越好！':'接住💩越多越好！');
  drawBg();
  if(sc.darkMode){darkVisible=false;drawDarkOverlay();}
  else{dx.clearRect(0,0,W,H);}
  running=true;sfxStart();
  if(animId) cancelAnimationFrame(animId);
  last=performance.now();
  animId=requestAnimationFrame(loop);
  if(cntId) clearInterval(cntId);
  cntId=setInterval(function(){
    tLeft--;tiEl.textContent=fmtTime(tLeft);
    if(tLeft<=0){clearInterval(cntId);endGame(true);}
  },1000);
}

function endGame(timeout,msg){
  running=false;clearEffects();
  cancelAnimationFrame(animId);
  if(cntId) clearInterval(cntId);
  dx.clearRect(0,0,W,H);
  var oe=document.getElementById('oe');
  var ot=document.getElementById('ot');
  var om=document.getElementById('om');
  if(timeout){
    sfxWin();
    var star=score>=200?'🏆':score>=100?'🎉':'😅';
    oe.textContent=star;
    ot.textContent=score>=200?'粑粑大师！':score>=100?'厉害啊！':'加油哦～';
    om.textContent='场景：'+SCENES[currentScene].name+'\n最终得分：'+score+'分';
  } else {
    sfxFlush();
    oe.textContent='😱';ot.textContent='游戏结束！';
    om.textContent=(msg||'发生意外！')+'\n得分：'+score+'分';
  }
  overscreen.style.display='flex';
}

function showSceneScreen(){
  overscreen.style.display='none';
  modescreen.style.display='none';
  scenescreen.style.display='flex';
  running=false;
  if(animId) cancelAnimationFrame(animId);
  if(cntId) clearInterval(cntId);
  cx.clearRect(0,0,W,H);dx.clearRect(0,0,W,H);
  sceneLabel.textContent='💩 粑粑大作战';
  // 显示默认背景
  bx.clearRect(0,0,W,H);
  bx.fillStyle='#1a1a2e';bx.fillRect(0,0,W,H);
}

// ── 按钮事件 ──────────────────────────────────────
function tapBtn(id, fn){
  var el=document.getElementById(id);
  if(!el) return;
  var fired=false;
  el.addEventListener('touchend',function(e){
    e.preventDefault();
    e.stopPropagation();
    if(!fired){fired=true;fn();setTimeout(function(){fired=false;},400);}
  },{passive:false});
  el.addEventListener('click',function(e){
    if(!fired){fired=true;fn();setTimeout(function(){fired=false;},400);}
  });
}
tapBtn('btn-park',function(){selectScene('park');});
tapBtn('btn-office',function(){selectScene('office');});
tapBtn('btn-home',function(){selectScene('home');});
tapBtn('btn-wild',function(){selectScene('wild');});
tapBtn('btn-poop',function(){startGame('poop');});
tapBtn('btn-toilet',function(){startGame('toilet');});
tapBtn('btn-restart',function(){startGame(mode);});
tapBtn('btn-change-scene',function(){showSceneScreen();});
tapBtn('btn-back-scene',function(){modescreen.style.display='none';scenescreen.style.display='flex';});

bindBtn(document.getElementById('btn-left'),function(){keys.left=true;},function(){keys.left=false;});
bindBtn(document.getElementById('btn-right'),function(){keys.right=true;},function(){keys.right=false;});

document.addEventListener('keydown',function(e){
  if(e.key==='ArrowLeft') keys.left=true;
  if(e.key==='ArrowRight') keys.right=true;
});
document.addEventListener('keyup',function(e){
  if(e.key==='ArrowLeft') keys.left=false;
  if(e.key==='ArrowRight') keys.right=false;
});

// 只对canvas阻止默认滚动，不影响overlay按钮
document.getElementById('gc').addEventListener('touchstart',function(e){e.preventDefault();},{passive:false});
document.getElementById('gc').addEventListener('touchmove',function(e){e.preventDefault();},{passive:false});
document.getElementById('bgc').addEventListener('touchstart',function(e){e.preventDefault();},{passive:false});
document.getElementById('ctrlbar').addEventListener('touchmove',function(e){e.preventDefault();},{passive:false});

// 按钮同时支持 touch 事件（部分安卓机 pointer 事件不稳定）
function bindBtn(el, onDown, onUp){
  el.addEventListener('pointerdown',onDown);
  el.addEventListener('pointerup',onUp);
  el.addEventListener('pointerleave',onUp);
  el.addEventListener('pointercancel',onUp);
  el.addEventListener('touchstart',function(e){e.preventDefault();onDown();},{passive:false});
  el.addEventListener('touchend',function(e){e.preventDefault();onUp();},{passive:false});
  el.addEventListener('touchcancel',function(e){e.preventDefault();onUp();},{passive:false});
}

// 初始化
bx.fillStyle='#1a1a2e';bx.fillRect(0,0,W,H);
</script>
